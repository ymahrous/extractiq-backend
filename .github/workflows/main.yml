name: Python application

# Triggers ONLY on pushes to main
on:
  push:
    branches: ["main"]
    paths:
      - "extractiq-backend/**" 

# Cancel any running workflows if you push again
concurrency:
  group: "tests"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Add a Postgres Service Container for tests
    services:
      # Spin up a throwaway Postgres database just for testing
      # Note: We override the DATABASE_URL to use this throwaway database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - uses: actions/cache@v4
      - run: pip install -r requirements.txt
      - run: pip install pytest httpx
      - run: pytest -v
